.tree-node{margin-left:0;user-select:none}

.tree-node .tn-toggle.expanded .tn-arrow{transform:rotate(90deg)}
.tree-node .tn-toggle .tn-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.tree-node .tn-toggle .tn-name{font-weight:600;font-size:11px}

// K线图悬停功能
var klineChart=null,klinePopup=null,klineTimer=null,klineCurCode='';

function initKlinePopup(){
  klinePopup=document.getElementById('klinePopup');
  document.addEventListener('mouseover',function(e){
    var card=e.target.closest('.pick-card');
    if(card&&card.dataset.code){
      clearTimeout(klineTimer);
      klineTimer=setTimeout(function(){showKline(card)},300);
    }else if(!e.target.closest('.kline-popup')){
      clearTimeout(klineTimer);
      klineTimer=setTimeout(hideKline,200);
    }
  });
  document.addEventListener('mouseout',function(e){
    var card=e.target.closest('.pick-card');
    var rt=e.relatedTarget;
    if(card){
      if(!rt||(!rt.closest&&rt!==document.documentElement)){
        clearTimeout(klineTimer);
        klineTimer=setTimeout(hideKline,300);
      }
    }else if(rt&&!rt.closest('.kline-popup')&&!rt.closest('.pick-card')){
      clearTimeout(klineTimer);
      klineTimer=setTimeout(hideKline,200);
    }
  });
}

function showKline(card){
  var code=card.dataset.code,name=card.dataset.name;
  if(!code||code.length<4)return;
  if(klineCurCode===code)return;
  klineCurCode=code;
  var rect=card.getBoundingClientRect();
  var pw=420,ph=290;
  var left=rect.left;
  var top=rect.bottom+5;
  if(left+pw>window.innerWidth)left=window.innerWidth-pw-10;
  if(top+ph>window.innerHeight)top=rect.top-ph-5;
  klinePopup.style.left=left+'px';
  klinePopup.style.top=top+'px';
  klinePopup.classList.add('show');
  document.getElementById('klineTitle').textContent=name+' ('+code+')';
  document.getElementById('klineBody').innerHTML='<div class="kline-loading">加载K线数据...</div>';
  fetchKline(code,name);
}

function hideKline(){
  klinePopup.classList.remove('show');
  klineCurCode='';
}

function fetchKline(code,name){
  // 优先从预嵌入数据读取
  var klines=KLINE_DATA[code];
  if(klines&&klines.length>=2){
    renderKlineChart(klines,name);return;
  }
  // 备选：腾讯JSONP
  tryTencentKline(code,name);
}
function tryTencentKline(code,name){
  var pfx=code.startsWith('6')?'sh':'sz';
  var varName='v_'+pfx+code;
  var timeoutId2=setTimeout(function(){
    delete window[varName];
    if(klineCurCode===code){
      var body=document.getElementById('klineBody');
      if(body&&!body.querySelector('canvas')){
        body.innerHTML='<div class="kline-error">K线数据获取失败</div>';
      }
    }
  },5000);
  window[varName]=function(resp){
    clearTimeout(timeoutId2);
    var key=pfx+code;
    var dayData=(resp.data&&resp.data[key]&&resp.data[key].day)||[];
    if(dayData.length<2){
      document.getElementById('klineBody').innerHTML='<div class="kline-error">K线数据不足</div>';
      return;
    }
    var klines=dayData.map(function(d){return d[0]+','+d[1]+','+d[2]+','+d[3]+','+d[4]+','+d[5]});
    renderKlineChart(klines,name);
  };
  var s=document.createElement('script');
  s.onerror=function(){
    clearTimeout(timeoutId2);
    if(klineCurCode===code){
      document.getElementById('klineBody').innerHTML='<div class="kline-error">K线数据获取失败，网络可能受限</div>';
    }
  };
  s.src='https://web.ifzq.gtimg.cn/appstock/app/fqkline/get?param='+pfx+code+',day,2025-01-01,,500,qfq&_='+Date.now();
  document.head.appendChild(s);
}

function renderKlineChart(klines,name){
  var body=document.getElementById('klineBody');
  body.innerHTML='';
  if(klineChart){klineChart.remove();klineChart=null;}
  var chart=LightweightCharts.createChart(body,{width:400,height:260,layout:{background:{color:'#fff'},textColor:'#333',fontSize:10},grid:{vertLines:{color:'#f1f5f9'},horzLines:{color:'#f1f5f9'}},crosshair:{mode:0},rightPriceScale:{borderColor:'#e2e8f0'},timeScale:{borderColor:'#e2e8f0',timeVisible:false,secondsVisible:false},handleScroll:{vertTouchDrag:false}});
  var candleData=[],volumeData=[];
  klines.forEach(function(line){
    var p=line.split(',');
    var t=p[0];
    if(t.indexOf('-')===-1&&t.length===8){t=t.substring(0,4)+'-'+t.substring(4,6)+'-'+t.substring(6,8);}
    var o=parseFloat(p[1]),cl=parseFloat(p[2]),h=parseFloat(p[3]),l=parseFloat(p[4]);
    var vol=parseFloat(p[5]);
    candleData.push({time:t,open:o,high:h,low:l,close:cl});
    volumeData.push({time:t,value:vol,color:cl>=o?'rgba(239,68,68,0.5)':'rgba(34,197,94,0.5)'});
  });
  var cs=chart.addCandlestickSeries({upColor:'#ef4444',downColor:'#22c55e',borderUpColor:'#ef4444',borderDownColor:'#22c55e',wickUpColor:'#ef4444',wickDownColor:'#22c55e'});
  cs.setData(candleData);
  var vs=chart.addHistogramSeries({priceFormat:{type:'volume'},priceScaleId:'volume',scaleMargins:{top:0.8,bottom:0}});
  vs.setData(volumeData);
  chart.timeScale().fitContent();
  klineChart=chart;
}

function buildTreeHTML(nodes,depth){
  if(!nodes||!nodes.length)return '<div style="padding:10px;color:var(--text3);font-size:11px">暂无题材数据</div>';
  var html='';
  nodes.forEach(function(node){
    var hasChildren=node.children&&node.children.length>0;
    var isActive=node.is_active||node.stocks.length>0;
    var nodeId='tn_'+node.name.replace(/[^a-zA-Z0-9一-鿿]/g,'_');
    if(hasChildren){
      html+='<div class="tree-node" data-name="'+node.name+'">';
      html+='<div class="tn-toggle" onclick="toggleTree(this,&quot;'+nodeId+'&quot;)" title="'+node.name+'">';
      html+='<span class="tn-arrow">&#9654;</span>';
      if(node.color)html+='<span class="tn-dot" style="background:'+node.color+'"></span>';
      html+='<span class="tn-name">'+node.name+'</span>';
      if(node.main_count>0||node.active_count>0){
        html+='<span class="tn-count">('+(node.main_count>0?node.main_count+'主线, ':'')+node.active_count+'活跃)</span>';
      }
      html+='</div>';
      html+='<div class="tn-children" id="'+nodeId+'">'+buildTreeHTML(node.children,depth+1)+'</div>';
      html+='</div>';
    }else{
      // Leaf node with stocks
      html+='<div class="tree-node" data-name="'+node.name+'">';
      html+='<div class="tn-toggle" style="cursor:default">';
      html+='<span style="width:10px;display:inline-block"></span>';
      if(node.color)html+='<span class="tn-dot" style="background:'+node.color+'"></span>';
      html+='<span class="tn-name" style="font-size:10px;font-weight:500">'+node.name+'</span>';
      if(node.stocks&&node.stocks.length){
        html+='<span class="tn-count" style="font-size:8px">'+node.stocks.length+'股</span>';
      }
      html+='</div>';
      if(node.stocks&&node.stocks.length){
        html+='<div style="margin-left:18px">';
        node.stocks.forEach(function(s){
          html+='<div class="tn-leaf" data-name="'+s.name+'">';
          html+='<span class="tn-leaf-dot"></span>';
          html+='<span class="tn-leaf-name">'+s.name+'</span>';
          if(s.code)html+='<span class="tn-leaf-code">'+s.code+'</span>';
          if(s.max_lb)html+='<span class="tn-leaf-lb">'+s.max_lb+'板</span>';
          if(s.today_zt)html+='<span class="tn-leaf-zt">涨停</span>';
          html+='</div>';
        });
        html+='</div>';
      }
      html+='</div>';
    }
  });
  return html;
}
function toggleTree(el,childId){

}

// ENH 5a: Tree search
function filterTree(){
  var q=document.getElementById('treeSearchInput').value.toLowerCase().trim();
  var clear=document.getElementById('tsClear');
  clear.style.display=q?'inline':'none';
  var nodes=document.querySelectorAll('.tree-node');
  if(!q){
    nodes.forEach(function(n){n.style.display=''});
    // Collapse all
    document.querySelectorAll('.tn-children').forEach(function(c){c.classList.remove('open')});
    document.querySelectorAll('.tn-toggle').forEach(function(t){t.classList.remove('expanded')});
    return;
  }
  nodes.forEach(function(n){
    var name=(n.getAttribute('data-name')||'').toLowerCase();
    if(name.indexOf(q)>=0){
      n.style.display='';
      // Expand parents
      var p=n.parentElement;
      while(p){
        if(p.classList.contains('tn-children')){p.classList.add('open');
          var tog=p.previousElementSibling;
          if(tog&&tog.classList.contains('tn-toggle'))tog.classList.add('expanded');
        }
        p=p.parentElement;
      }
    }else{
      n.style.display='none';
    }
  });
}
function clearTreeSearch(){
  document.getElementById('treeSearchInput').value='';
  document.getElementById('tsClear').style.display='none';
  filterTree();
}

        h+='<span style="color:#1565c0;font-weight:bold">['+p.type+']</span> ';
        h+='<span style="color:#2e7d32">'+p.impact+'</span> ';
        h+=p.detail||p.title||'';
        if(p.time)h+='<span style="color:#999;float:right">'+p.time+'</span>';
        h+='</div>';
      }
      h+='</div>';
    }

    // 风险预警
    if(t.news.risk_signals&&t.news.risk_signals.length>0){
      h+='<div style="margin-bottom:10px"><div style="font-size:12px;font-weight:bold;color:#c62828;margin-bottom:4px">&#9888; 风险预警 ('+t.news.risk_signals.length+')</div>';
      for(var r of t.news.risk_signals){
        h+='<div style="padding:6px 10px;background:#ffebee;border-radius:4px;margin-bottom:4px;font-size:11px">';
        h+='<span style="color:#c62828;font-weight:bold">['+r.risk_type+']</span> ';
        if(r.stock)h+='<span style="color:#333;font-weight:bold">'+r.stock+'</span> ';
        h+=r.detail||r.title||'';
        if(r.time)h+='<span style="color:#999;float:right">'+r.time+'</span>';
        h+='</div>';
      }
      h+='</div>';
    }

    // 事件驱动机会（新增）
    if(t.news.event_opportunities&&t.news.event_opportunities.length>0){
      h+='<div style="margin-bottom:10px"><div style="font-size:12px;font-weight:bold;color:#6a1b9a;margin-bottom:4px">&#128161; 事件驱动机会 ('+t.news.event_opportunities.length+')</div>';
      for(var e of t.news.event_opportunities){
        var confColor=e.confidence>=70?'#2e7d32':(e.confidence>=50?'#f57f17':'#9e9e9e');
        h+='<div style="padding:6px 10px;background:#f3e5f5;border-radius:4px;margin-bottom:4px;font-size:11px">';
        h+='<span style="color:#6a1b9a;font-weight:bold">['+e.type+']</span> ';
        h+='<span style="color:'+confColor+';font-weight:bold">'+e.confidence+'%</span> ';
        h+=e.description||e.title||'';
        if(e.sector)h+='<span style="color:#1565c0"> - '+e.sector+'</span>';
        h+='</div>';
      }
      h+='</div>';
    }

    // 题材轮动（新增）
    if(t.news.theme_rotation&&t.news.theme_rotation.expected_themes&&t.news.theme_rotation.expected_themes.length>0){
      h+='<div style="margin-bottom:10px"><div style="font-size:12px;font-weight:bold;color:#00838f;margin-bottom:4px">&#128260; 题材轮动分析</div>';
      h+='<div style="font-size:11px;color:#666;margin-bottom:4px">'+(t.news.theme_rotation.current_month_desc||'')+'</div>';
      for(var th of t.news.theme_rotation.expected_themes){
        var hColor=th.heat_score>=70?'#2e7d32':(th.heat_score>=40?'#f57f17':'#9e9e9e');
        h+='<div style="padding:4px 10px;background:#e0f7fa;border-radius:4px;margin-bottom:3px;font-size:11px">';
        h+='<span style="font-weight:bold">'+th.theme+'</span> ';
        h+='<span style="color:'+hColor+'">热度:'+th.heat_score+'</span>';
        if(th.reason)h+=' <span style="color:#666">('+th.reason+')</span>';
        h+='</div>';
      }
      h+='</div>';
    }

    // 社区情绪（新增）
    if(t.news.community_sentiment){
      var cs=t.news.community_sentiment;
      var csColor=cs.sentiment_index>20?'#2e7d32':(cs.sentiment_index<-20?'#c62828':'#f57f17');
      h+='<div style="margin-bottom:10px"><div style="font-size:12px;font-weight:bold;color:#37474f;margin-bottom:4px">&#128172; 社区情绪指数</div>';
      h+='<div style="padding:8px 12px;background:#eceff1;border-radius:6px;font-size:12px">';
      h+='<span style="font-size:20px;font-weight:bold;color:'+csColor+'">'+(cs.sentiment_index||0).toFixed(1)+'</span>';
      h+='<span style="font-size:11px;color:#666;margin-left:8px">'+(cs.description||'')+'</span>';
      h+='</div></div>';
    }

    // 投资日历（新增）
    if(t.news.investment_calendar&&t.news.investment_calendar.length>0){
      h+='<div style="margin-bottom:10px"><div style="font-size:12px;font-weight:bold;color:#558b2f;margin-bottom:4px">&#128197; 投资日历 (未来30天)</div>';
      for(var ev of t.news.investment_calendar){
        h+='<div style="padding:4px 10px;background:#f1f8e9;border-radius:4px;margin-bottom:3px;font-size:11px">';
        h+='<span style="color:#558b2f;font-weight:bold">'+ev.date+'</span> ';
        h+='<span style="color:#1565c0">'+ev.type+'</span> ';
        h+=ev.description||ev.title||'';
        h+='</div>';
      }
      h+='</div>';
    }

    // 板块情绪
    if(t.news.sector_sentiment){
      h+='<div style="margin-bottom:10px"><div style="font-size:12px;font-weight:bold;color:#00695c;margin-bottom:4px">&#128202; 板块新闻情绪</div>';
      h+='<table style="width:100%;border-collapse:collapse;font-size:11px">';
      h+='<tr style="background:#f5f5f5"><th style="padding:4px;text-align:left">板块</th><th style="padding:4px;text-align:center">情绪指数</th><th style="padding:4px;text-align:center">利好</th><th style="padding:4px;text-align:center">利空</th><th style="padding:4px;text-align:center">中性</th></tr>';
      for(var sec in t.news.sector_sentiment){
        var ss=t.news.sector_sentiment[sec];
        var si=ss.sentiment_index||0;
        var siColor=si>30?'#2e7d32':(si<-30?'#c62828':'#f57f17');
        h+='<tr><td style="padding:4px">'+sec+'</td><td style="padding:4px;text-align:center;font-weight:bold;color:'+siColor+'">'+si.toFixed(0)+'</td><td style="padding:4px;text-align:center;color:#2e7d32">'+(ss.positive||0)+'</td><td style="padding:4px;text-align:center;color:#c62828">'+(ss.negative||0)+'</td><td style="padding:4px;text-align:center;color:#999">'+(ss.neutral||0)+'</td></tr>';
      }
      h+='</table></div>';
    }

    // 热点话题
    if(t.news.hot_topics&&t.news.hot_topics.length>0){
      h+='<div style="margin-bottom:10px"><div style="font-size:12px;font-weight:bold;color:#7b1fa2;margin-bottom:4px">&#128293; 热点话题</div>';
      for(var ht of t.news.hot_topics){
        h+='<div style="padding:6px 10px;background:#f3e5f5;border-radius:4px;margin-bottom:4px;font-size:11px">';
        h+='<span style="font-weight:bold">'+ht.topic+'</span> ';
        h+='<span style="color:#7b1fa2">热度:'+ht.heat_score+'</span> ';
        h+='<span style="color:#999">('+ht.news_count+'条)</span>';
        if(ht.sentiment)h+=' <span style="color:'+(ht.sentiment==='利好'?'#2e7d32':(ht.sentiment==='利空'?'#c62828':'#999'))+'">'+ht.sentiment+'</span>';
        h+='</div>';
      }
      h+='</div>';
    }

    if(t.news.summary){
      h+='<div style="margin-top:10px;padding:10px;background:#f5f5f5;border-radius:6px;font-size:12px;line-height:1.8;white-space:pre-wrap">'+t.news.summary+'</div>';
    }
    h+='</div>';
  }

  el.innerHTML=h;
}

function init(){
  renderNav();renderKPI();renderLabels();renderCanvas();setupWheel();
  renderCycleSummary();renderStrategy();renderFund();renderLibrary();
  renderAnalystTeam();initKlinePopup();

    if(chart)chart.resize();
    setTimeout(function(){winStart=Math.max(0,total-COL);updateScroll();},50);
  });
}
